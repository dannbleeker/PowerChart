name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run coverage
      - run: npx vite build
      # The committed production manifests must match a fresh generation from
      # the dev manifests (same lockstep idea as the showcase deck).
      - name: Production manifests are current
        run: npm run build:manifest -- --check
      # Package the Claude Agent Skill from the same sources the tests just
      # validated, so the artifact can never drift from the feature set.
      - run: npm run skill
      - uses: actions/upload-artifact@v4
        with:
          name: powerchart-charts-skill
          path: skill-dist/powerchart-charts.zip
      # The committed showcase deck must match a fresh build — regenerate and
      # compare slide XMLs (deterministic; docProps timestamps excluded).
      - name: Showcase deck is current
        run: |
          cp examples/showcase.pptx /tmp/committed.pptx
          node scripts/build-showcase.mjs
          python3 - <<'EOF'
          import sys, zipfile
          a = zipfile.ZipFile('/tmp/committed.pptx')
          b = zipfile.ZipFile('examples/showcase.pptx')
          slides_a = sorted(n for n in a.namelist() if n.startswith('ppt/slides/slide'))
          slides_b = sorted(n for n in b.namelist() if n.startswith('ppt/slides/slide'))
          if slides_a != slides_b or any(a.read(n) != b.read(n) for n in slides_a):
              sys.exit("examples/showcase.pptx is stale — run `npm run showcase` and commit the result")
          print("showcase deck is current")
          EOF

  # Every merge to main refreshes the rolling "skill-latest" release, giving
  # the newest skill zip a stable download URL.
  release-skill:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run skill
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: skill-latest
          name: PowerChart Agent Skill (latest)
          body: >
            Rolling build of the Claude Agent Skill from the latest main.
            Upload the zip at claude.ai → Customize → Skills; it then also
            appears inside Claude for PowerPoint.
          prerelease: true
          files: skill-dist/powerchart-charts.zip
