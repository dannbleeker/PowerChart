name: Release

# Versioned releases: push a tag like v0.1.0 and this attaches everything a
# user needs — the Claude skill zip, both add-in manifests, and the feature
# showcase deck — with auto-generated notes.
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run skill
      - run: npm run showcase
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            skill-dist/powerchart-charts.zip
            manifest.xml
            manifest-excel.xml
            examples/showcase.pptx
