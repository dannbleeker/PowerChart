name: Release

# Versioned releases: push a tag like v0.1.0 (or run this workflow manually
# with a version input — it creates the tag) and this attaches everything a
# user needs — the Claude skill zip, both add-in manifests, and the feature
# showcase deck — with auto-generated notes.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Tag to create and release, e.g. v0.1.0"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run skill
      - run: npm run showcase
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          generate_release_notes: true
          files: |
            skill-dist/powerchart-charts.zip
            manifest.xml
            manifest-excel.xml
            examples/showcase.pptx
