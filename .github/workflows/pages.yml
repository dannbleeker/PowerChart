name: Deploy Pages

# Hosts the add-in + demo gallery on GitHub Pages (custom domain:
# powerchart.struktureretsundfornuft.dk). Office add-ins load their task pane
# and icons over HTTPS from here; the production manifests point at this origin.
# Separate from ci.yml so a docs/test change doesn't redeploy the site.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
