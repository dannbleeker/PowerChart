<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PowerChart — demo gallery</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #f4f3f0;
        color: #0b0b0b;
      }
      h1 { font-size: 20px; margin: 0 0 4px; }
      p.sub { color: #52514e; margin: 0 0 20px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(500px, 1fr)); gap: 20px; }
      figure {
        margin: 0;
        background: #fff;
        border: 1px solid #e1e0d9;
        border-radius: 8px;
        padding: 12px;
      }
      figcaption { font-size: 12px; color: #898781; margin-bottom: 8px; }
      svg { width: 100%; height: auto; display: block; }
    </style>
  </head>
  <body>
    <h1>PowerChart demo gallery</h1>
    <p class="sub">
      Every chart below is produced by the same layout engine the PowerPoint add-in uses —
      here rendered to SVG, in PowerPoint rendered as native editable shapes.
    </p>
    <div id="gallery" class="grid"></div>
    <script type="module" src="/src/demo/demo.ts"></script>
  </body>
</html>
